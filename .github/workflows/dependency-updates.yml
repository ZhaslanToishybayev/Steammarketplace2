name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  # ========================================
  # UPDATE DEPENDENCIES
  # ========================================
  update-dependencies:
    name: 🔄 Update Dependencies
    runs-on: ubuntu-latest
    if: github.repository_owner == 'your-username'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Update dependencies
        run: |
          npm update
          npm audit fix --force

      - name: Update frontend dependencies
        run: |
          cd frontend
          npm update
          npm audit fix --force

      - name: Run tests
        run: |
          npm test
          cd frontend && npm test
        env:
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test_jwt_secret
          SESSION_SECRET: test_session_secret
          NODE_ENV: test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '🔄 Dependency Updates'
          body: |
            ## Automated Dependency Updates

            This PR contains the following updates:

            ### Backend Dependencies
            - Updated all npm packages to their latest versions
            - Applied security patches

            ### Frontend Dependencies
            - Updated all frontend packages to their latest versions
            - Applied security patches

            ### Testing
            - All tests pass successfully
            - No breaking changes detected

            ---
            *This PR is automatically created by GitHub Actions*
          branch: update/dependencies
          delete-branch: true

  # ========================================
  # SECURITY ADVISORIES
  # ========================================
  security-advisory:
    name: 🔒 Security Advisory Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json > snyk-results.json
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v3
        with:
          name: security-scan-results
          path: snyk-results.json

  # ========================================
  # LICENSE CHECK
  # ========================================
  license-check:
    name: 📄 License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: |
          npm install -g license-checker
          license-checker --summary --onlyAllow 'MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause'
        continue-on-error: true

  # ========================================
  # OUTDATED DEPENDENCIES
  # ========================================
  outdated:
    name: ⏰ Outdated Dependencies Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for outdated dependencies
        run: |
          npm outdated --depth=0 > outdated.txt || true
          cat outdated.txt

      - name: Upload outdated report
        uses: actions/upload-artifact@v3
        with:
          name: outdated-dependencies
          path: outdated.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outdated = fs.readFileSync('outdated.txt', 'utf8');
            if (outdated.trim()) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📦 Outdated Dependencies\n\nThe following dependencies are outdated:\n\n\`\`\`\n${outdated}\n\`\`\n\nPlease review and update these packages.`
              });
            }