version: '3.8'

# Production Docker Compose configuration
# This file demonstrates a hardened production setup
# Always use environment variables or .env files for secrets in production

services:
  # Backend API - Production optimized
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: steam-marketplace-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      STEAM_API_KEY: ${STEAM_API_KEY}
      STEAM_REALM: ${STEAM_REALM}
      STEAM_RETURN_URL: ${STEAM_RETURN_URL}
      AUTH_RATE_LIMIT_TTL: ${AUTH_RATE_LIMIT_TTL:-60}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN}
      WS_URL: ${WS_URL}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - steam-marketplace-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx Load Balancer - Production with SSL
  nginx:
    image: nginx:alpine
    container_name: steam-marketplace-nginx-prod
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/production.conf:ro
    networks:
      - steam-marketplace-network
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - production

volumes:
  # Use external volumes in production
  postgres_data:
    driver: local
    external: true
    name: steam-marketplace-postgres-prod
  mongo_data:
    driver: local
    external: true
    name: steam-marketplace-mongo-prod
  redis_data:
    driver: local
    external: true
    name: steam-marketplace-redis-prod

networks:
  steam-marketplace-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16