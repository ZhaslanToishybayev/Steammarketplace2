version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: steam-marketplace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-steam_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-steam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in your environment or .env file}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - steam-marketplace-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steam_user} -d ${POSTGRES_DB:-steam_marketplace}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: steam-marketplace-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?Please set MONGO_ROOT_USERNAME in your environment or .env file}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?Please set MONGO_ROOT_PASSWORD in your environment or .env file}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-steam_marketplace}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - steam-marketplace-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: steam-marketplace-redis
    restart: unless-stopped
    command: >
      sh -c "
        redis-server --appendonly yes
        --requirepass ${REDIS_PASSWORD:?Please set REDIS_PASSWORD in your environment or .env file}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --tcp-keepalive 300
        --timeout 0
        --tcp-backlog 511
        --databases 16
        --save 900 1
        --save 300 10
        --save 60 10000
      "
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - steam-marketplace-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    container_name: steam-marketplace-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-steam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in your environment or .env file}
      POSTGRES_DB: ${POSTGRES_DB:-steam_marketplace}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:?Please set MONGO_ROOT_USERNAME in your environment or .env file}:${MONGO_ROOT_PASSWORD:?Please set MONGO_ROOT_PASSWORD in your environment or .env file}@mongodb:27017/${MONGO_DB:-steam_marketplace}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Please set REDIS_PASSWORD in your environment or .env file}
      JWT_SECRET: ${JWT_SECRET:?Please set JWT_SECRET in your environment or .env file}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Please set JWT_REFRESH_SECRET in your environment or .env file}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      STEAM_API_KEY: ${STEAM_API_KEY:?Please set STEAM_API_KEY in your environment or .env file}
      STEAM_REALM: ${STEAM_REALM:-http://localhost:3001}
      STEAM_RETURN_URL: ${STEAM_RETURN_URL:-http://localhost:3001/api/auth/steam/return}
      AUTH_RATE_LIMIT_TTL: ${AUTH_RATE_LIMIT_TTL:-60}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - ./apps/backend/logs:/app/logs
    networks:
      - steam-marketplace-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: npm run start:dev
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Application
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: steam-marketplace-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}/api
      NEXT_PUBLIC_WS_URL: ws://localhost:${BACKEND_PORT:-3001}
      NEXT_PUBLIC_STEAM_RETURN_URL: http://localhost:${FRONTEND_PORT:-3000}/api/auth/steam/return
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
      - /app/out
    networks:
      - steam-marketplace-network
    depends_on:
      - backend
    working_dir: /app
    command: npm run dev
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Grafana Monitoring Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: steam-marketplace-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Please set GRAFANA_PASSWORD in your environment or .env file}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - steam-marketplace-network
    depends_on:
      - backend
    profiles:
      - monitoring

  # Prometheus Monitoring Server
  prometheus:
    image: prom/prometheus:latest
    container_name: steam-marketplace-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - steam-marketplace-network
    depends_on:
      - backend
    profiles:
      - monitoring

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-steam_user}:${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in your environment or .env file}@postgres:5432/${POSTGRES_DB:-steam_marketplace}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - steam-marketplace-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - monitoring

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?Please set REDIS_PASSWORD in your environment or .env file}"
    ports:
      - "9121:9121"
    networks:
      - steam-marketplace-network
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - monitoring

  # Node Exporter
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - steam-marketplace-network
    profiles:
      - monitoring

  # MongoDB Exporter
  mongodb-exporter:
    image: percona/mongodb_exporter:latest
    container_name: mongodb-exporter
    restart: unless-stopped
    environment:
      MONGODB_URI: "mongodb://${MONGO_ROOT_USERNAME:?Please set MONGO_ROOT_USERNAME in your environment or .env file}:${MONGO_ROOT_PASSWORD:?Please set MONGO_ROOT_PASSWORD in your environment or .env file}@mongodb:27017/${MONGO_DB:-steam_marketplace}?authSource=admin"
    ports:
      - "9216:9216"
    networks:
      - steam-marketplace-network
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - monitoring
  # Nginx Load Balancer (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: steam-marketplace-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - steam-marketplace-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/postgres-data
  mongo_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/mongo-data
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/redis-data
  grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/grafana-data
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker/prometheus-data

networks:
  steam-marketplace-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16