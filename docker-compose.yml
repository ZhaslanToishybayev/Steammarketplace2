services:
  # MongoDB Database
  mongodb:
    image: mongo:4.4
    container_name: steam-marketplace-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --bind_ip_all
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-steam-marketplace}
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand({ping: 1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - steam-marketplace

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: steam-marketplace-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - steam-marketplace

  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steam-marketplace-app
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-steam-marketplace}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      STEAM_API_KEY: ${STEAM_API_KEY}
      STEAM_CLIENT_ID: ${STEAM_CLIENT_ID}
      STEAM_CLIENT_SECRET: ${STEAM_CLIENT_SECRET}
      SENTRY_DSN: ${SENTRY_DSN}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - steam-marketplace

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  steam-marketplace:
    name: steam-marketplace
    driver: bridge
