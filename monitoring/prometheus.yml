# Prometheus Configuration
# https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s  # How frequently to collect metrics
  evaluation_interval: 15s  # How frequently to evaluate rules
  external_labels:
    monitor: 'steam-marketplace-monitor'
    environment: 'production'  # Can be overridden per job

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # ==============================================================================
  # 🏷️ PROMETHESUS SELF-MONITORING
  # ==============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s
    metrics_path: /metrics

  # ==============================================================================
  # 🔷 STEAM MARKETPLACE APPLICATION
  # ==============================================================================
  - job_name: 'steam-marketplace-app'
    static_configs:
      - targets: ['app:3001']
    scrape_interval: 15s
    metrics_path: /metrics
    scrape_timeout: 10s
    honor_labels: true
    params:
      format: ['prometheus']

  # ==============================================================================
  # 🗄️ MONGODB EXPORTER
  # ==============================================================================
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    scrape_interval: 30s
    metrics_path: /metrics

  # ==============================================================================
  # ⚡ REDIS EXPORTER
  # ==============================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s
    metrics_path: /metrics

  # ==============================================================================
  # 📊 NGINX EXPORTER
  # ==============================================================================
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 30s
    metrics_path: /metrics

  # ==============================================================================
  # 🐳 DOCKER CONTAINER METRICS
  # ==============================================================================
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
    metrics_path: /metrics

  # ==============================================================================
  # 🗄️ NODE EXPORTER (SYSTEM METRICS)
  # ==============================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    metrics_path: /metrics

  # ==============================================================================
  # 🏗️ BLACKBOX EXPORTER (HTTP CHECKS)
  # ==============================================================================
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]  # Look for a HTTP 200 response
    static_configs:
      - targets:
        - http://app:3001/api/health  # Health check
        - http://app:3001/api/auth/test-user  # Auth endpoint
        - https://sgomarket.com  # Production URL
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

# ==============================================================================
# 📊 REMOTE WRITE (OPTIONAL - FOR LONG-TERM STORAGE)
