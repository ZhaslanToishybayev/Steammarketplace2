# Recording Rules for Steam Marketplace
# Pre-aggregate metrics for faster queries
# https://prometheus.io/docs/prometheus/latest/configuration/recording_rules/

groups:
  # ==============================================================================
  # 📊 REQUEST RATE AGGREGATIONS
  # ==============================================================================
  - name: request-rates
    interval: 30s
    rules:
      # Overall request rate
      - record: steam_marketplace:http_requests_rate_5m
        expr: rate(http_requests_total[5m])

      # Request rate by endpoint
      - record: steam_marketplace:http_requests_rate_5m:by_endpoint
        expr: rate(http_requests_total{endpoint!=""}[5m])

      # Request rate by method
      - record: steam_marketplace:http_requests_rate_5m:by_method
        expr: rate(http_requests_total{method!=""}[5m])

      # Request rate by status code
      - record: steam_marketplace:http_requests_rate_5m:by_status
        expr: rate(http_requests_total{status!=""}[5m])

      # Request rate by service
      - record: steam_marketplace:http_requests_rate_5m:by_service
        expr: rate(http_requests_total{service!=""}[5m])

  # ==============================================================================
  # ⏱️ LATENCY AGGREGATIONS
  # ==============================================================================
  - name: latency-aggregations
    interval: 30s
    rules:
      # Overall latency percentiles
      - record: steam_marketplace:http_request_duration:p95_5m
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: steam_marketplace:http_request_duration:p99_5m
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      - record: steam_marketplace:http_request_duration:mean_5m
        expr: rate(http_request_duration_seconds_sum[5m]) / rate(http_request_duration_seconds_count[5m])

      # Latency by endpoint
      - record: steam_marketplace:http_request_duration:p95_5m:by_endpoint
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{endpoint!=""}[5m])
          )

      # Latency by method
      - record: steam_marketplace:http_request_duration:p95_5m:by_method
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{method!=""}[5m])
          )

  # ==============================================================================
  # ❌ ERROR RATE AGGREGATIONS
  # ==============================================================================
  - name: error-rates
    interval: 30s
    rules:
      # Overall error rate
      - record: steam_marketplace:http_errors_rate_5m
        expr: rate(http_requests_total{status=~"5.."}[5m])

      # Error rate by endpoint
      - record: steam_marketplace:http_errors_rate_5m:by_endpoint
        expr: rate(http_requests_total{status=~"5..", endpoint!=""}[5m])

      # Error rate by status code
      - record: steam_marketplace:http_errors_rate_5m:by_status
        expr: rate(http_requests_total{status=~"5.."}[5m])

      # Error rate percentage
      - record: steam_marketplace:http_errors_percentage_5m
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m]) /
            rate(http_requests_total[5m])
          ) * 100

  # ==============================================================================
  # 🔄 THROUGHPUT AGGREGATIONS
  # ==============================================================================
  - name: throughput-aggregations
    interval: 30s
    rules:
      # Active connections
      - record: steam_marketplace:http_connections:avg
        expr: avg(http_connections_active)

      # Request queue size
      - record: steam_marketplace:http_queue_size:avg
        expr: avg(http_queue_size)

  # ==============================================================================
  # 💾 DATABASE METRICS AGGREGATIONS
  # ==============================================================================
  - name: database-aggregations
    interval: 30s
    rules:
      # Database query rate
      - record: steam_marketplace:db_queries_rate_5m
        expr: rate(db_queries_total[5m])

      # Database query latency
      - record: steam_marketplace:db_query_duration:p95_5m
        expr: histogram_quantile(0.95, rate(db_query_duration_seconds_bucket[5m]))

      - record: steam_marketplace:db_query_duration:p99_5m
        expr: histogram_quantile(0.99, rate(db_query_duration_seconds_bucket[5m]))

      # Database connections
      - record: steam_marketplace:db_connections_utilization
        expr: |
          (
            mongodb_connections{state="current"} /
            (mongodb_connections{state="current"} + mongodb_connections{state="available"})
          ) * 100

  # ==============================================================================
  # ⚡ CACHE METRICS AGGREGATIONS
  # ==============================================================================
  - name: cache-aggregations
    interval: 30s
    rules:
      # Cache hit rate
      - record: steam_marketplace:cache_hit_rate_5m
        expr: |
          (
            rate(redis_keyspace_hits_total[5m]) /
            (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))
          ) * 100

      # Cache operations rate
      - record: steam_marketplace:cache_operations_rate_5m
        expr: rate(redis_operations_total[5m])

      # Cache memory usage
      - record: steam_marketplace:cache_memory_usage_bytes
        expr: redis_memory_used_bytes

  # ==============================================================================
  # 🔑 AUTHENTICATION METRICS AGGREGATIONS
  # ==============================================================================
  - name: auth-aggregations
    interval: 30s
    rules:
      # Authentication success rate
      - record: steam_marketplace:auth_success_rate_5m
        expr: rate(auth_attempts_total{result="success"}[5m])

      # Authentication failure rate
      - record: steam_marketplace:auth_failure_rate_5m
        expr: rate(auth_attempts_total{result="failure"}[5m])

      # Active sessions
      - record: steam_marketplace:active_sessions
        expr: auth_active_sessions

      # Token refresh rate
      - record: steam_marketplace:token_refresh_rate_5m
        expr: rate(token_refresh_total[5m])

  # ==============================================================================
  # 💼 BUSINESS METRICS AGGREGATIONS
  # ==============================================================================
  - name: business-aggregations
    interval: 60s
    rules:
      # Marketplace transaction rate
      - record: steam_marketplace:transactions_rate_5m
        expr: rate(marketplace_transactions_total[5m])

      # Trade offer rate
      - record: steam_marketplace:trade_offers_rate_5m
        expr: rate(trade_offers_total[5m])

      # Steam API rate
      - record: steam_marketplace:steam_api_rate_5m
        expr: rate(steam_api_requests_total[5m])

      # Steam API latency
      - record: steam_marketplace:steam_api_duration:p95_5m
        expr: histogram_quantile(0.95, rate(steam_api_request_duration_seconds_bucket[5m]))

      # Active users (hourly average)
      - record: steam_marketplace:active_users_1h
        expr: avg_over_time(auth_active_users[1h])

  # ==============================================================================
  # 🏗️ SYSTEM METRICS AGGREGATIONS
  # ==============================================================================
  - name: system-aggregations
    interval: 30s
    rules:
      # CPU usage
      - record: steam_marketplace:cpu_usage_5m
        expr: |
          100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)

      # Memory usage
      - record: steam_marketplace:memory_usage_5m
        expr: |
          (
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) /
            node_memory_MemTotal_bytes
          ) * 100

      # Disk usage
      - record: steam_marketplace:disk_usage_5m
        expr: |
          (
            (node_filesystem_size_bytes - node_filesystem_avail_bytes) /
            node_filesystem_size_bytes
          ) * 100

      # Network I/O
      - record: steam_marketplace:network_receive_bytes_rate_5m
        expr: rate(node_network_receive_bytes_total[5m])

      - record: steam_marketplace:network_transmit_bytes_rate_5m
        expr: rate(node_network_transmit_bytes_total[5m])

  # ==============================================================================
  # 📦 CONTAINER METRICS AGGREGATIONS
  # ==============================================================================
  - name: container-aggregations
    interval: 30s
    rules:
      # Container CPU usage
      - record: steam_marketplace:container_cpu_usage_5m
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100

      # Container memory usage
      - record: steam_marketplace:container_memory_usage_bytes
        expr: container_memory_usage_bytes

      # Container network I/O
      - record: steam_marketplace:container_network_receive_bytes_rate_5m
        expr: rate(container_network_receive_bytes_total[5m])

      - record: steam_marketplace:container_network_transmit_bytes_rate_5m
        expr: rate(container_network_transmit_bytes_total[5m])

  # ==============================================================================
  # 📈 SLO AGGREGATIONS
  # ==============================================================================
  - name: slo-aggregations
    interval: 30s
    rules:
      # Availability SLO (99.9%)
      - record: steam_marketplace:availability_5m
        expr: |
          (
            1 -
            (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]))
          ) * 100

      # Latency SLO (95th percentile < 500ms)
      - record: steam_marketplace:latency_slo_5m
        expr: |
          (
            steam_marketplace:http_request_duration:p95_5m < 0.5
          ) * 100

      # Error rate SLO (< 0.1%)
      - record: steam_marketplace:error_rate_slo_5m
        expr: |
          (
            steam_marketplace:http_errors_percentage_5m < 0.1
          ) * 100
