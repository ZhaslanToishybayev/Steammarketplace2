<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 CS2 Skin Marketplace - Trade Skins Instantly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #0a0e27;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, rgba(79, 172, 254, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Navbar */
        .navbar {
            background: rgba(10, 14, 39, 0.9) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            padding: 0.5rem 0;
            background: rgba(10, 14, 39, 0.95) !important;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand i {
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        .hero-section {
            background: var(--primary-gradient);
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        /* Stats Cards */
        .stats-card {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stats-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .stats-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stats-card:hover::before {
            left: 100%;
        }

        .stats-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: var(--success-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: bounce 2s infinite;
        }

        .stats-number {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 1;
        }

        /* Search and Filters */
        .search-filters {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            margin-top: -50px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .form-select, .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .form-select:focus, .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            color: var(--text-primary);
        }

        .form-select option {
            background: #1a1a2e;
            color: var(--text-primary);
        }

        /* Skin Cards Grid */
        .skins-grid {
            margin-top: 3rem;
        }

        .skin-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.6s ease;
            margin-bottom: 2rem;
        }

        .skin-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--primary-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .skin-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
        }

        .skin-card:hover::before {
            opacity: 0.05;
        }

        .skin-card > * {
            position: relative;
            z-index: 1;
        }

        .skin-image-container {
            position: relative;
            overflow: hidden;
            background: #1a1a2e;
        }

        .skin-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .skin-card:hover .skin-image {
            transform: scale(1.1);
        }

        .skin-rarity-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--secondary-gradient);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .skin-info {
            padding: 1.5rem;
        }

        .skin-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .skin-weapon {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .skin-condition {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        .skin-footer {
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skin-price {
            font-size: 1.75rem;
            font-weight: 800;
            background: var(--success-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-buy {
            background: var(--success-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }

        .btn-outline-light {
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: var(--text-primary);
        }

        /* Status Indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #ef4444;
        }

        /* Modal */
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
            padding: 1.5rem;
        }

        .btn-close {
            background: none;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .btn-close:hover {
            opacity: 1;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        /* Load More Button */
        .load-more-btn {
            margin: 3rem auto;
            display: block;
            min-width: 200px;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .stats-card {
                padding: 1.5rem;
            }

            .stats-icon {
                font-size: 2rem;
            }

            .stats-number {
                font-size: 2rem;
            }

            .search-filters {
                margin-top: -30px;
            }
        }

        /* Scroll Animations */
        .scroll-animate {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .scroll-animate.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fab fa-steam"></i>
                <span>CS2 SKIN MARKETPLACE</span>
            </a>
            <div class="navbar-nav ms-auto d-flex align-items-center">
                <div class="status-indicator me-4">
                    <span class="status-dot" id="botStatusDot"></span>
                    <span id="botStatus">Steam Bot Online</span>
                </div>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sellModal">
                    <i class="fas fa-plus me-2"></i>
                    <span>Sell Item</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero-section">
        <div class="container">
            <div class="hero-content text-center">
                <h1 class="hero-title">🎮 Trade CS2 Skins Instantly</h1>
                <p class="hero-subtitle">Buy and sell CS2 skins safely with instant Steam trades • 0% fees • Full protection</p>

                <div class="row mt-5">
                    <div class="col-md-4 mb-3">
                        <div class="stats-card scroll-animate">
                            <div class="stats-icon">
                                <i class="fas fa-exchange-alt"></i>
                            </div>
                            <div class="stats-number" id="totalTrades">0</div>
                            <p class="text-white-50 mb-0">Total Trades</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="stats-card scroll-animate">
                            <div class="stats-icon">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="stats-number" id="activeUsers">1</div>
                            <p class="text-white-50 mb-0">Active Users</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="stats-card scroll-animate">
                            <div class="stats-icon">
                                <i class="fas fa-coins"></i>
                            </div>
                            <div class="stats-number" id="totalVolume">$0</div>
                            <p class="text-white-50 mb-0">Trading Volume</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container main-container">
        <!-- Search and Filters -->
        <div class="search-filters scroll-animate">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white-50">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0" id="searchInput"
                               placeholder="Search for skins...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="weaponFilter">
                        <option value="">All Weapons</option>
                        <option value="AK-47">AK-47</option>
                        <option value="AWP">AWP</option>
                        <option value="M4A4">M4A4</option>
                        <option value="M4A1-S">M4A1-S</option>
                        <option value="USP-S">USP-S</option>
                        <option value="Glock">Glock</option>
                        <option value="Desert Eagle">Desert Eagle</option>
                        <option value="FAMAS">FAMAS</option>
                        <option value="Pistols">Pistols</option>
                        <option value="Rifles">Rifles</option>
                        <option value="Knives">Knives</option>
                        <option value="Gloves">Gloves</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="rarityFilter">
                        <option value="">All Rarities</option>
                        <option value="Covert">Covert (Red)</option>
                        <option value="Classified">Classified (Pink)</option>
                        <option value="Restricted">Restricted (Purple)</option>
                        <option value="Mil-Spec Grade">Mil-Spec Grade (Blue)</option>
                        <option value="Consumer Grade">Consumer Grade (Gray)</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-light w-100" onclick="filterSkins()">
                        <i class="fas fa-filter me-2"></i>
                        Filter
                    </button>
                </div>
            </div>
        </div>

        <!-- Skins Grid -->
        <div class="row skins-grid" id="skinsGrid">
            <!-- Skins will be loaded here -->
        </div>

        <!-- Load More Button -->
        <button class="btn btn-outline-light load-more-btn scroll-animate" onclick="loadMoreSkins()">
            <i class="fas fa-plus-circle me-2"></i>
            <span>Load More Skins</span>
        </button>
    </div>

    <!-- Sell Modal -->
    <div class="modal fade" id="sellModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title d-flex align-items-center gap-2">
                        <i class="fas fa-plus-circle" style="background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                        List Item for Sale
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="sellForm">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-tag me-2"></i>
                                Item Name
                            </label>
                            <input type="text" class="form-control" id="itemName" placeholder="e.g., AK-47 | Redline" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-dollar-sign me-2"></i>
                                Price ($)
                            </label>
                            <input type="number" class="form-control" id="itemPrice" step="0.01" min="0" placeholder="0.00" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-layer-group me-2"></i>
                                    Weapon Type
                                </label>
                                <select class="form-select" id="itemWeapon">
                                    <option value="AK-47">AK-47</option>
                                    <option value="AWP">AWP</option>
                                    <option value="M4A4">M4A4</option>
                                    <option value="M4A1-S">M4A1-S</option>
                                    <option value="USP-S">USP-S</option>
                                    <option value="Glock">Glock</option>
                                    <option value="Desert Eagle">Desert Eagle</option>
                                    <option value="FAMAS">FAMAS</option>
                                    <option value="Knife">Knife</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">
                                    <i class="fas fa-star me-2"></i>
                                    Condition
                                </label>
                                <select class="form-select" id="itemCondition">
                                    <option value="Factory New">Factory New</option>
                                    <option value="Minimal Wear">Minimal Wear</option>
                                    <option value="Field-Tested">Field-Tested</option>
                                    <option value="Well-Worn">Well-Worn</option>
                                    <option value="Battle-Scarred">Battle-Scarred</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>
                        Cancel
                    </button>
                    <button type="button" class="btn btn-primary" onclick="sellItem()">
                        <i class="fas fa-check me-2"></i>
                        List for Sale
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Trade Modal -->
    <div class="modal fade" id="tradeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title d-flex align-items-center gap-2">
                        <i class="fas fa-handshake" style="background: var(--success-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                        Confirm Trade
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="tradeDetails"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>
                        Cancel
                    </button>
                    <button type="button" class="btn btn-buy" id="confirmTradeBtn">
                        <i class="fas fa-check me-2"></i>
                        Confirm Trade
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container">
        <!-- Toasts will be added here -->
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

        const socket = io();

        // Sample skins data
        let skins = [
            {
                id: 1,

                image: "https://community.cloudflare.steamstatic.com/economy/image/class/730/3563296/300x300",
                condition: "Field-Tested",
                seller: "user123"
            },
            {
                id: 2,
                name: "AWP | Dragon Lore",
                weapon: "AWP",
                rarity: "Covert",
                price: 1250.00,
                image: "https://community.cloudflare.steamstatic.com/economy/image/class/730/1691135/300x300",
                condition: "Factory New",
                seller: "user456"
            },
            {
                id: 3,
                name: "M4A4 | Howl",
                weapon: "M4A4",

        let displayedSkins = [];
        let currentPage = 1;
        const skinsPerPage = 6;

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            loadMoreSkins();
            initScrollAnimations();
            initNavbarScroll();
            initSocketListeners();
        });

        // Navbar scroll effect
        function initNavbarScroll() {
            window.addEventListener('scroll', function() {
                const navbar = document.querySelector('.navbar');
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        }

        // Scroll animations
        function initScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.1
            });

            document.querySelectorAll('.scroll-animate').forEach(el => {
                observer.observe(el);
            });
        }

        // Socket listeners
        function initSocketListeners() {
            socket.on('statsUpdate', function(data) {
                document.getElementById('totalTrades').textContent = data.totalTrades;
                document.getElementById('totalVolume').textContent = '$' + data.totalVolume.toFixed(2);
                animateCounter('totalTrades', data.totalTrades);
                animateCounter('totalVolume', data.totalVolume);
            });
        }

        // Animate counters
        function animateCounter(id, target) {
            const element = document.getElementById(id);
            const start = parseFloat(element.textContent.replace(/[^0-9.-]+/g,"")) || 0;
            const duration = 1000;
            const startTime = performance.now();

            function updateCounter(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = start + (target - start) * progress;

                if (id === 'totalTrades') {
                    element.textContent = Math.floor(current);
                } else {
                    element.textContent = '$' + current.toFixed(2);
                }

                if (progress < 1) {
                    requestAnimationFrame(updateCounter);
                }
            }

            requestAnimationFrame(updateCounter);
        }

        // Load skins
        function loadMoreSkins() {
            const start = (currentPage - 1) * skinsPerPage;
            const end = start + skinsPerPage;
            const newSkins = skins.slice(start, end);

            if (newSkins.length === 0) {
                showToast('No more skins to load', 'info');
                return;
            }

            newSkins.forEach((skin, index) => {
                setTimeout(() => {
                    displaySkin(skin);
                }, index * 100);
            });

            displayedSkins = displayedSkins.concat(newSkins);
            currentPage++;

            showToast(`Loaded ${newSkins.length} skins`, 'success');
        }

        // Display skin
        function displaySkin(skin) {
            const grid = document.getElementById('skinsGrid');
            const col = document.createElement('div');
            col.className = 'col-lg-4 col-md-6 scroll-animate';

            const rarityColor = {
                'Covert': 'linear-gradient(135deg, #ee0000 0%, #ff4444 100%)',
                'Classified': 'linear-gradient(135deg, #d32ce6 0%, #e91e63 100%)',
                'Restricted': 'linear-gradient(135deg, #8847ff 0%, #9c27b0 100%)',
                'Mil-Spec Grade': 'linear-gradient(135deg, #4b69ff 0%, #3f51b5 100%)',
                'Consumer Grade': 'linear-gradient(135deg, #b0c3d9 0%, #607d8b 100%)'
            };

            col.innerHTML = `
                <div class="skin-card">
                    <div class="skin-image-container">
                        <img src="${skin.image}" alt="${skin.name}" class="skin-image" loading="lazy">
                        <div class="skin-rarity-badge" style="background: ${rarityColor[skin.rarity] || 'var(--secondary-gradient)'}">
                            ${skin.rarity}
                        </div>
                    </div>
                    <div class="skin-info">
                        <h3 class="skin-name">${skin.name}</h3>
                        <div class="skin-weapon">
                            <i class="fas fa-gun"></i>
                            <span>${skin.weapon}</span>
                        </div>
                        <div class="skin-condition">
                            <i class="fas fa-star-half-alt me-1"></i>
                            ${skin.condition}
                        </div>
                    </div>
                    <div class="skin-footer">
                        <div class="skin-price">$${skin.price.toFixed(2)}</div>
                        <button class="btn btn-buy" onclick="buySkin(${skin.id})">
                            <i class="fas fa-shopping-cart me-2"></i>
                            Buy Now
                        </button>
                    </div>
                </div>
            `;

            grid.appendChild(col);
        }

        // Buy skin
        function buySkin(skinId) {
            const skin = skins.find(s => s.id === skinId);
            if (!skin) return;

            const modal = document.getElementById('tradeModal');
            const tradeDetails = document.getElementById('tradeDetails');

            tradeDetails.innerHTML = `
                <div class="text-center p-4">
                    <img src="${skin.image}" alt="${skin.name}" class="mb-3" style="width: 200px; height: 200px; object-fit: cover; border-radius: 15px;">
                    <h4>${skin.name}</h4>
                    <p class="text-white-50">${skin.weapon} • ${skin.condition}</p>
                    <div class="d-flex justify-content-center align-items-center gap-2 mt-3">
                        <i class="fas fa-tag"></i>
                        <span class="h4 mb-0">$${skin.price.toFixed(2)}</span>
                    </div>
                    <p class="text-white-50 mt-3">Seller: ${skin.seller}</p>
                </div>
            `;

            const bsModal = new bootstrap.Modal(modal);
            bsModal.show();

            document.getElementById('confirmTradeBtn').onclick = function() {
                confirmTrade(skinId);
                bsModal.hide();
            };
        }

        // Confirm trade
        function confirmTrade(skinId) {
            const skin = skins.find(s => s.id === skinId);
            if (!skin) return;

            // Simulate trade
            showToast(`Trade confirmed for ${skin.name}!`, 'success');

            // Update stats
            socket.emit('tradeComplete', {
                skinId: skinId,
                price: skin.price
            });
        }

        // Sell item
        function sellItem() {
            const itemName = document.getElementById('itemName').value;
            const itemPrice = parseFloat(document.getElementById('itemPrice').value);
            const itemCondition = document.getElementById('itemCondition').value;
            const itemWeapon = document.getElementById('itemWeapon').value;

            if (!itemName || !itemPrice) {
                showToast('Please fill all fields', 'error');
                return;
            }

            // Add to skins array
            const newSkin = {
                id: Date.now(),
                name: itemName,
                weapon: itemWeapon,
                rarity: 'Mil-Spec Grade',
                price: itemPrice,
                image: 'https://community.cloudflare.steamstatic.com/economy/image/class/730/3563296/300x300',
                condition: itemCondition,
                seller: 'You'
            };

            skins.unshift(newSkin);

            // Close modal
            const bsModal = bootstrap.Modal.getInstance(document.getElementById('sellModal'));
            bsModal.hide();

            // Clear form
            document.getElementById('sellForm').reset();

            // Show success message
            showToast(`${itemName} listed for $${itemPrice.toFixed(2)}!`, 'success');
        }

        // Filter skins
        function filterSkins() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const weaponFilter = document.getElementById('weaponFilter').value;
            const rarityFilter = document.getElementById('rarityFilter').value;

            const grid = document.getElementById('skinsGrid');
            grid.innerHTML = '';

            let filtered = skins.filter(skin => {
                const matchesSearch = skin.name.toLowerCase().includes(search);
                const matchesWeapon = !weaponFilter || skin.weapon === weaponFilter;
                const matchesRarity = !rarityFilter || skin.rarity === rarityFilter;

                return matchesSearch && matchesWeapon && matchesRarity;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-search" style="font-size: 4rem; opacity: 0.5;"></i>
                        <h3 class="mt-3">No skins found</h3>
                        <p class="text-white-50">Try adjusting your filters</p>
                    </div>
                `;
            } else {
                filtered.forEach(skin => displaySkin(skin));
            }

            showToast(`Found ${filtered.length} skin(s)`, 'info');
        }

        // Show toast notification
        function showToast(message, type = 'info') {
            const toastContainer = document.querySelector('.toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="toast-body d-flex align-items-center gap-2">
                    <i class="fas ${getToastIcon(type)}"></i>
                    <span>${message}</span>
                </div>
            `;

            toastContainer.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast, { delay: 3000 });
            bsToast.show();

            toast.addEventListener('hidden.bs.toast', () => {
                toast.remove();
            });
        }

        function getToastIcon(type) {
            switch(type) {
                case 'success': return 'fa-check-circle';
                case 'error': return 'fa-exclamation-circle';
                case 'warning': return 'fa-exclamation-triangle';
                default: return 'fa-info-circle';
            }
        }

        // Search input filter
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(this.searchTimeout);
            this.searchTimeout = setTimeout(() => {
                filterSkins();
            }, 500);
        });
    </script>
