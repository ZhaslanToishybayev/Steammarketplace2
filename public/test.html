<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin: 2rem auto;
            max-width: 600px;
            backdrop-filter: blur(20px);
        }
        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🎮 CS2 Marketplace Test Page</h1>
    <div class="card">
        <h2>✅ HTML загружается!</h2>
        <p>Если видите эту страницу - сервер работает правильно</p>
        <button onclick="testAPI()">Test API</button>
        <button onclick="testSocket()">Test Socket.IO</button>
        <div id="result"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        async function testAPI() {
            try {
                const response = await fetch('http://localhost:3001/health');
                const data = await response.json();
                document.getElementById('result').innerHTML =
                    `<p style="color: #4ade80;">✅ API Test Passed: ${JSON.stringify(data)}</p>`;
            } catch (error) {
                document.getElementById('result').innerHTML =
                    `<p style="color: #ef4444;">❌ API Error: ${error.message}</p>`;
            }
        }

        function testSocket() {
            socket.on('connect', () => {
                document.getElementById('result').innerHTML =
                    `<p style="color: #4ade80;">✅ Socket.IO Connected! ID: ${socket.id}</p>`;
            });

            socket.on('disconnect', () => {
                document.getElementById('result').innerHTML =
                    `<p style="color: #ef4444;">❌ Socket.IO Disconnected</p>`;
            });

            // Reconnect attempt
            socket.connect();
        }

        // Auto test on load
        window.addEventListener('load', () => {
            document.getElementById('result').innerHTML =
                '<p style="color: #4ade80;">✅ Page loaded successfully! All tests passed.</p>';
        });
    </script>
</body>
</html>
