# SonarQube Project Configuration
# https://docs.sonarqube.org/latest/analysis/analysis-parameters/

# Project Information
sonar.projectKey=steam-marketplace
sonar.projectName=Steam Marketplace
sonar.projectVersion=1.0.0
sonar.scm.provider=git

# Source Code
sonar.sources=.
sonar.tests=tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,frontend/dist/**,frontend/build/**

# JavaScript/TypeScript
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.testExecutionReportPaths=coverage/test-report.xml

# Code Coverage
sonar.coverage.exclusions=**/tests/**,**/node_modules/**,**/migrations/**,**/seeders/**,**/*.config.js,**/app.js,**/server.js,**/docker-compose*.yml
# sonar.coverageReportPaths=coverage/coverage-final.json

# Encoding
sonar.sourceEncoding=UTF-8

# Additional Properties
sonar.javascript.environments=node,browser,mongo
# sonar.eslint.reportPaths=eslint-report.json

# Security Hotspots
sonar.security.hotspots.ignoreHours=0-7
sonar.security.hotspots.minScore=0.7

# Duplication Detection
sonar.cpd.exclusions=**/tests/**,**/migrations/**,node_modules/**

# Quality Gate
sonar.qualitygate.wait=true
