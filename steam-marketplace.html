<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Marketplace - Trade CS:GO, Rust, Dota 2 Items</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .logo h1 {
            font-size: 2em;
            font-weight: bold;
        }

        .auth-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-steam {
            background: #1bb71b;
            color: white;
        }

        .btn-steam:hover {
            background: #14a214;
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .user-name {
            font-weight: 600;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid #4CAF50;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            font-size: 2em;
        }

        .stat-info h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-info p {
            opacity: 0.8;
            font-size: 0.9em;
        }

        .inventory-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: #4CAF50;
        }

        .item-image {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .item-price {
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.1em;
        }

        .trade-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .trade-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .game-card:hover {
            transform: translateY(-3px);
            border-color: #4CAF50;
        }

        .game-card.active {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .game-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2em;
            opacity: 0.8;
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #ff4444;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .auth-buttons {
                width: 100%;
                justify-content: center;
            }

            .trade-form {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .steam-loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2C6.477,2,2,6.477,2,12s4.477,10,10,10s10-4.477,10-10S17.523,2,12,2z M12,18c-3.314,0-6-2.686-6-6 s2.686-6,6-6s6,2.686,6,6S15.314,18,12,18z"/>
                    <path d="M13,7h-2v4H7v2h4v4h2v-4h4v-2h-4V7z"/>
                </svg>
                <h1>Steam Marketplace</h1>
            </div>
            <div class="auth-buttons" id="authButtons">
                <button class="btn btn-steam" onclick="steamLogin()">
                    <svg viewBox="0 0 24 24" width="20" height="20" style="fill: white;">
                        <path d="M12,2C6.477,2,2,6.477,2,12s4.477,10,10,10s10-4.477,10-10S17.523,2,12,2z"/>
                    </svg>
                    Войти через Steam
                </button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <img src="" alt="Avatar" class="user-avatar" id="userAvatar">
                <span class="user-name" id="userName"></span>
                <button class="btn btn-secondary" onclick="logout()">Выйти</button>
            </div>
        </div>

        <!-- Loading Screen -->
        <div class="loading" id="loadingScreen">
            <div class="steam-loading"></div>
            <span style="margin-left: 15px;">Загрузка Steam Marketplace...</span>
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard" id="dashboard" style="display: none;">
            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <h3 id="balance">$0.00</h3>
                        <p>Баланс</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🎮</div>
                    <div class="stat-info">
                        <h3 id="tradeCount">0</h3>
                        <p>Торгов</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-info">
                        <h3 id="itemCount">0</h3>
                        <p>Предметов</p>
                    </div>
                </div>
            </div>

            <!-- Inventory Section -->
            <div class="inventory-section">
                <h2 class="section-title">
                    <span>📦</span>
                    Мой инвентарь
                </h2>
                <div class="loading" id="inventoryLoading">
                    <div class="steam-loading"></div>
                    <span style="margin-left: 15px;">Загрузка инвентаря...</span>
                </div>
                <div class="inventory-grid" id="inventoryGrid" style="display: none;">
                    <!-- Items will be loaded here -->
                </div>
                <div class="error" id="inventoryError" style="display: none;">
                    Не удалось загрузить инвентарь. Пожалуйста, попробуйте позже.
                </div>
            </div>

            <!-- Trade Section -->
            <div class="trade-section">
                <h2 class="section-title">
                    <span>🔄</span>
                    Торговля с ботом
                </h2>

                <!-- Game Selection -->
                <div class="games-grid">
                    <div class="game-card active" data-appid="730">
                        <div class="game-icon">🔫</div>
                        <div>CS:GO</div>
                    </div>
                    <div class="game-card" data-appid="570">
                        <div class="game-icon">🎮</div>
                        <div>Dota 2</div>
                    </div>
                    <div class="game-card" data-appid="252490">
                        <div class="game-icon">🔧</div>
                        <div>Rust</div>
                    </div>
                    <div class="game-card" data-appid="440">
                        <div class="game-icon">🩺</div>
                        <div>Team Fortress 2</div>
                    </div>
                </div>

                <!-- Trade Form -->
                <div class="trade-form">
                    <div class="form-group">
                        <label for="tradeUrl">Steam Trade URL</label>
                        <input type="url" id="tradeUrl" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=..." required>
                    </div>
                    <div class="form-group">
                        <label for="selectedItems">Предметы для обмена</label>
                        <select id="selectedItems" multiple>
                            <option value="">Выберите предметы из инвентаря</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="createTradeOffer()">
                    <span>🔄</span>
                    Создать торговое предложение
                </button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentUser = null;
        let userInventory = [];
        let selectedGame = 730; // Default to CS:GO

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Game selection
            document.querySelectorAll('.game-card').forEach(card => {
                card.addEventListener('click', function() {
                    document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    selectedGame = parseInt(this.dataset.appid);
                    if (currentUser) {
                        loadUserInventory();
                    }
                });
            });

            // Trade URL validation
            document.getElementById('tradeUrl').addEventListener('input', function() {
                const url = this.value;
                const isValid = url.includes('steamcommunity.com/tradeoffer/new/');
                this.style.borderColor = isValid || !url ? '#4CAF50' : '#f44336';
            });
        }

        function checkAuthStatus() {
            const token = localStorage.getItem('steam_token');
            if (token) {
                verifyToken(token);
            } else {
                showAuthScreen();
            }
        }

        function showAuthScreen() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('authButtons').style.display = 'flex';
            document.getElementById('userInfo').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('authButtons').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
        }

        async function steamLogin() {
            try {
                // Redirect to Steam OAuth
                window.location.href = 'http://localhost:3001/api/auth/steam';
            } catch (error) {
                console.error('Steam login error:', error);
                alert('Ошибка входа через Steam. Пожалуйста, попробуйте позже.');
            }
        }

        async function verifyToken(token) {
            try {
                const response = await fetch('http://localhost:3001/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    currentUser = userData;
                    updateUserInterface();
                    showDashboard();
                    loadUserInventory();
                    loadUserStats();
                } else {
                    throw new Error('Token verification failed');
                }
            } catch (error) {
                console.error('Token verification error:', error);
                localStorage.removeItem('steam_token');
                showAuthScreen();
            }
        }

        function updateUserInterface() {
            document.getElementById('userName').textContent = currentUser.steamName || currentUser.username;
            document.getElementById('userAvatar').src = currentUser.avatar || '/default-avatar.png';
        }

        async function logout() {
            localStorage.removeItem('steam_token');
            currentUser = null;
            userInventory = [];
            showAuthScreen();
        }

        async function loadUserInventory() {
            try {
                const token = localStorage.getItem('steam_token');
                const response = await fetch(`http://localhost:3001/api/inventory/user?appId=${selectedGame}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    userInventory = await response.json();
                    displayInventory(userInventory);
                } else {
                    throw new Error('Failed to load inventory');
                }
            } catch (error) {
                console.error('Load inventory error:', error);
                document.getElementById('inventoryError').style.display = 'block';
                document.getElementById('inventoryLoading').style.display = 'none';
            }
        }

        function displayInventory(inventory) {
            const grid = document.getElementById('inventoryGrid');
            const loading = document.getElementById('inventoryLoading');
            const error = document.getElementById('inventoryError');

            loading.style.display = 'none';
            error.style.display = 'none';
            grid.style.display = 'grid';

            grid.innerHTML = '';

            if (inventory.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 40px; opacity: 0.6;">Ваш инвентарь пуст</div>';
                return;
            }

            inventory.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'item-card';
                itemCard.innerHTML = `
                    <div class="item-image" style="background-image: url('${item.imageUrl}'); background-size: cover; background-position: center;">
                        ${!item.imageUrl ? '📦' : ''}
                    </div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">$${item.price ? item.price.toFixed(2) : '0.00'}</div>
                `;

                itemCard.addEventListener('click', () => toggleItemSelection(itemCard, item));
                grid.appendChild(itemCard);
            });
        }

        function toggleItemSelection(itemCard, item) {
            const isSelected = itemCard.classList.toggle('selected');
            itemCard.style.borderColor = isSelected ? '#4CAF50' : 'rgba(255, 255, 255, 0.2)';
            itemCard.style.background = isSelected ? 'rgba(76, 175, 80, 0.1)' : 'rgba(255, 255, 255, 0.1)';

            // Update selected items in form
            updateSelectedItems();
        }

        function updateSelectedItems() {
            const selectedCards = document.querySelectorAll('.item-card.selected');
            const select = document.getElementById('selectedItems');
            select.innerHTML = '';

            if (selectedCards.length === 0) {
                select.innerHTML = '<option value="">Выберите предметы из инвентаря</option>';
                return;
            }

            selectedCards.forEach(card => {
                const itemName = card.querySelector('.item-name').textContent;
                const option = document.createElement('option');
                option.value = itemName;
                option.textContent = itemName;
                select.appendChild(option);
            });
        }

        async function loadUserStats() {
            try {
                const token = localStorage.getItem('steam_token');
                const [balanceResponse, tradesResponse] = await Promise.all([
                    fetch('http://localhost:3001/api/wallet/balance', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch('http://localhost:3001/api/trades/user', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                if (balanceResponse.ok) {
                    const balanceData = await balanceResponse.json();
                    document.getElementById('balance').textContent = `$${balanceData.balance || 0}`;
                }

                if (tradesResponse.ok) {
                    const tradesData = await tradesResponse.json();
                    document.getElementById('tradeCount').textContent = tradesData.length || 0;
                }

                document.getElementById('itemCount').textContent = userInventory.length || 0;
            } catch (error) {
                console.error('Load stats error:', error);
            }
        }

        async function createTradeOffer() {
            const tradeUrl = document.getElementById('tradeUrl').value;
            const selectedItems = Array.from(document.querySelectorAll('.item-card.selected'));

            if (!tradeUrl || !tradeUrl.includes('steamcommunity.com/tradeoffer/new/')) {
                alert('Пожалуйста, введите действительный Steam Trade URL');
                return;
            }

            if (selectedItems.length === 0) {
                alert('Пожалуйста, выберите предметы для обмена');
                return;
            }

            try {
                const token = localStorage.getItem('steam_token');
                const items = selectedItems.map(card => {
                    const name = card.querySelector('.item-name').textContent;
                    const price = parseFloat(card.querySelector('.item-price').textContent.replace('$', ''));
                    return { name, price };
                });

                const response = await fetch('http://localhost:3001/api/trades/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        tradeUrl,
                        items,
                        appId: selectedGame
                    })
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(`Торговое предложение создано! ID: ${result.tradeId}`);
                    // Clear selection
                    selectedItems.forEach(card => {
                        card.classList.remove('selected');
                        card.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                        card.style.background = 'rgba(255, 255, 255, 0.1)';
                    });
                    updateSelectedItems();
                } else {
                    const error = await response.json();
                    alert(`Ошибка создания предложения: ${error.message || 'Неизвестная ошибка'}`);
                }
            } catch (error) {
                console.error('Create trade error:', error);
                alert('Ошибка создания торгового предложения. Пожалуйста, попробуйте позже.');
            }
        }

        // Handle OAuth callback
        function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');

            if (error) {
                alert(`Ошибка аутентификации: ${error}`);
                return;
            }

            if (token) {
                localStorage.setItem('steam_token', token);
                window.location.href = '/'; // Redirect to main page
            }
        }

        // Check if this is a callback from Steam OAuth
        if (window.location.pathname === '/' && window.location.search.includes('token=')) {
            handleOAuthCallback();
        }
    </script>
</body>
</html>
