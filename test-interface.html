<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Marketplace - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .logo h1 {
            font-size: 2.5em;
            font-weight: bold;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .panel h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: #4CAF50;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-secondary {
            background: #2196F3;
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .btn-warning {
            background: #FF9800;
        }

        .btn-warning:hover {
            background: #F57C00;
        }

        .btn-danger {
            background: #f44336;
        }

        .btn-danger:hover {
            background: #e53935;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #4CAF50;
        }

        .status-card.warning {
            border-left-color: #FF9800;
        }

        .status-card.error {
            border-left-color: #f44336;
        }

        .status-card.info {
            border-left-color: #2196F3;
        }

        .status-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .status-content {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .result {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .game-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .game-btn {
            padding: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
        }

        .game-btn:hover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
        }

        .game-btn.active {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            color: #4CAF50;
        }

        .steam-loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #f44336;
        }

        .success {
            color: #4CAF50;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .game-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2C6.477,2,2,6.477,2,12s4.477,10,10,10s10-4.477,10-10S17.523,2,12,2z M12,18c-3.314,0-6-2.686-6-6 s2.686-6,6-6s6,2.686,6,6S15.314,18,12,18z"/>
                    <path d="M13,7h-2v4H7v2h4v4h2v-4h4v-2h-4V7z"/>
                </svg>
                <h1>Steam Marketplace</h1>
            </div>
            <div class="subtitle">Тестовый интерфейс для проверки функционала</div>
        </div>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left Panel: API Tests -->
            <div class="panel">
                <h2>🔧 Тестирование API</h2>

                <button class="btn btn-primary" onclick="testBackendHealth()">
                    🏥 Проверить Backend Health
                </button>

                <button class="btn btn-secondary" onclick="testSimpleAPI()">
                    🔌 Проверить Simple API
                </button>

                <button class="btn btn-warning" onclick="testSteamAuth()">
                    🔑 Steam OAuth Аутентификация
                </button>

                <button class="btn btn-danger" onclick="testInventory()">
                    📦 Проверить Инвентарь
                </button>

                <div class="result" id="apiResult">
                    Результаты тестов будут отображаться здесь...
                </div>
            </div>

            <!-- Right Panel: Manual Tests -->
            <div class="panel">
                <h2>🎮 Ручное тестирование</h2>

                <div class="status-card info">
                    <div class="status-title">📊 Состояние системы</div>
                    <div class="status-content" id="systemStatus">
                        Проверка состояния...
                    </div>
                </div>

                <div class="form-group">
                    <label>🎮 Выберите игру:</label>
                    <div class="game-selector">
                        <div class="game-btn active" data-appid="730" onclick="selectGame(this, 730)">
                            🔫 CS:GO
                        </div>
                        <div class="game-btn" data-appid="570" onclick="selectGame(this, 570)">
                            🎮 Dota 2
                        </div>
                        <div class="game-btn" data-appid="252490" onclick="selectGame(this, 252490)">
                            🔧 Rust
                        </div>
                        <div class="game-btn" data-appid="440" onclick="selectGame(this, 440)">
                            🩺 TF2
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>🔗 Steam Trade URL:</label>
                    <input type="url" id="tradeUrl" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=..." />
                </div>

                <div class="form-group">
                    <label>💬 Сообщение для теста:</label>
                    <input type="text" id="testMessage" placeholder="Тестовое сообщение" value="Тест Steam Marketplace" />
                </div>

                <button class="btn btn-primary" onclick="createTestTrade()">
                    🔄 Создать тестовое предложение
                </button>

                <button class="btn btn-secondary" onclick="checkUserAuth()">
                    👤 Проверить аутентификацию
                </button>

                <div class="result" id="manualResult">
                    Результаты ручных тестов...
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedGame = 730; // Default CS:GO
        let authToken = localStorage.getItem('steam_token');

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkSystemStatus();
            updateAuthButtons();
        });

        function updateAuthButtons() {
            const authButtons = document.querySelectorAll('.auth-required');
            if (authToken) {
                authButtons.forEach(btn => btn.style.display = 'block');
            } else {
                authButtons.forEach(btn => btn.style.display = 'none');
            }
        }

        async function checkSystemStatus() {
            const statusEl = document.getElementById('systemStatus');
            statusEl.textContent = 'Проверка...';

            try {
                // Check backend
                const backendResponse = await fetch('http://localhost:3001/health');
                const simpleResponse = await fetch('http://localhost:3004/api/health');

                let status = '✅ Все сервисы работают\n';
                status += `Backend: ${backendResponse.ok ? '✅' : '❌'}\n`;
                status += `Simple API: ${simpleResponse.ok ? '✅' : '❌'}`;

                statusEl.textContent = status;
            } catch (error) {
                statusEl.textContent = `❌ Ошибка: ${error.message}`;
            }
        }

        async function testBackendHealth() {
            const resultEl = document.getElementById('apiResult');
            resultEl.innerHTML = '<div class="loading"><div class="steam-loading"></div>Тестирование...</div>';

            try {
                // Используем прокси через наш тестовый сервер для обхода CORS
                const response = await fetch('http://localhost:3005/api/proxy/backend');
                const data = await response.json();

                if (data.status === 'success') {
                    resultEl.innerHTML = `✅ Backend Health Test\n\n`;
                    resultEl.innerHTML += `Backend Status: ${data.backend_status}\n`;
                    resultEl.innerHTML += `Response: ${data.backend_response}\n\n`;
                    resultEl.innerHTML += `🔧 Backend API полностью функционален!`;
                } else {
                    resultEl.innerHTML = `❌ Backend Health Test Failed\n\n`;
                    resultEl.innerHTML += `Error: ${data.error}\n`;
                    resultEl.innerHTML += `Message: ${data.message}`;
                }
            } catch (error) {
                resultEl.innerHTML = `❌ Backend Health Test Failed\n\nError: ${error.message}`;
            }
        }

        async function testSimpleAPI() {
            const resultEl = document.getElementById('apiResult');
            resultEl.innerHTML = '<div class="loading"><div class="steam-loading"></div>Тестирование...</div>';

            try {
                const [healthResponse, testResponse] = await Promise.all([
                    fetch('http://localhost:3004/api/health'),
                    fetch('http://localhost:3004/api/test')
                ]);

                const healthData = await healthResponse.json();
                const testData = await testResponse.json();

                resultEl.innerHTML = `✅ Simple API Test\n\n`;
                resultEl.innerHTML += `Health Status: ${healthResponse.status}\n`;
                resultEl.innerHTML += `Health Data: ${JSON.stringify(healthData, null, 2)}\n\n`;
                resultEl.innerHTML += `Test Status: ${testResponse.status}\n`;
                resultEl.innerHTML += `Test Data: ${JSON.stringify(testData, null, 2)}\n\n`;
                resultEl.innerHTML += `🔌 Simple API полностью функционален!`;
            } catch (error) {
                resultEl.innerHTML = `❌ Simple API Test Failed\n\nError: ${error.message}`;
            }
        }

        function testSteamAuth() {
            // Используем прямой редирект на Steam OAuth
            window.open('http://localhost:3001/api/auth/steam', '_blank');
        }

        async function testInventory() {
            const resultEl = document.getElementById('apiResult');
            resultEl.innerHTML = '<div class="loading"><div class="steam-loading"></div>Проверка инвентаря...</div>';

            if (!authToken) {
                resultEl.innerHTML = '❌ Сначала авторизуйтесь через Steam OAuth';
                return;
            }

            try {
                const response = await fetch(`http://localhost:3001/api/inventory/user?appId=${selectedGame}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `✅ Inventory Test\n\n`;
                    resultEl.innerHTML += `Status: ${response.status}\n`;
                    resultEl.innerHTML += `App ID: ${selectedGame}\n`;
                    resultEl.innerHTML += `Items: ${data.length}\n\n`;
                    resultEl.innerHTML += `📦 Инвентарь успешно загружен!`;
                } else {
                    resultEl.innerHTML = `❌ Inventory Test Failed\n\n`;
                    resultEl.innerHTML += `Status: ${response.status}\n`;
                    resultEl.innerHTML += `Error: ${response.statusText}`;
                }
            } catch (error) {
                resultEl.innerHTML = `❌ Inventory Test Failed\n\nError: ${error.message}`;
            }
        }

        function selectGame(element, appId) {
            document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            selectedGame = appId;
            document.getElementById('manualResult').textContent = `Выбрана игра: ${appId}`;
        }

        async function createTestTrade() {
            const resultEl = document.getElementById('manualResult');
            const tradeUrl = document.getElementById('tradeUrl').value;
            const message = document.getElementById('testMessage').value;

            if (!tradeUrl) {
                resultEl.textContent = '❌ Введите Steam Trade URL';
                return;
            }

            resultEl.innerHTML = '<div class="loading"><div class="steam-loading"></div>Создание предложения...</div>';

            try {
                const response = await fetch('http://localhost:3001/api/trades/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        tradeUrl,
                        items: [{ name: 'Test Item', price: 10 }],
                        appId: selectedGame,
                        message
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `✅ Test Trade Created\n\n`;
                    resultEl.innerHTML += `Trade ID: ${data.tradeId}\n`;
                    resultEl.innerHTML += `Status: ${data.status || 'pending'}\n\n`;
                    resultEl.innerHTML += `🔄 Тестовое торговое предложение создано!`;
                } else {
                    resultEl.innerHTML = `❌ Trade Creation Failed\n\n`;
                    resultEl.innerHTML += `Status: ${response.status}\n`;
                    resultEl.innerHTML += `Error: ${response.statusText}`;
                }
            } catch (error) {
                resultEl.innerHTML = `❌ Trade Creation Failed\n\nError: ${error.message}`;
            }
        }

        async function checkUserAuth() {
            const resultEl = document.getElementById('manualResult');

            if (!authToken) {
                resultEl.innerHTML = `❌ Пользователь не авторизован\n\n`;
                resultEl.innerHTML += `Нажмите "Steam OAuth Аутентификация" для входа`;
                return;
            }

            resultEl.innerHTML = '<div class="loading"><div class="steam-loading"></div>Проверка аутентификации...</div>';

            try {
                const response = await fetch('http://localhost:3001/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    resultEl.innerHTML = `✅ User Authentication\n\n`;
                    resultEl.innerHTML += `Steam ID: ${userData.steamId}\n`;
                    resultEl.innerHTML += `Username: ${userData.steamName || userData.username}\n`;
                    resultEl.innerHTML += `Avatar: ${userData.avatar ? '✅' : '❌'}\n\n`;
                    resultEl.innerHTML += `🔑 Пользователь успешно авторизован!`;
                } else {
                    resultEl.innerHTML = `❌ Authentication Failed\n\n`;
                    resultEl.innerHTML += `Status: ${response.status}`;
                }
            } catch (error) {
                resultEl.innerHTML = `❌ Authentication Failed\n\nError: ${error.message}`;
            }
        }

        // Handle OAuth callback
        function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const error = urlParams.get('error');

            if (error) {
                document.getElementById('manualResult').innerHTML = `❌ OAuth Error: ${error}`;
                return;
            }

            if (token) {
                localStorage.setItem('steam_token', token);
                authToken = token;
                updateAuthButtons();
                document.getElementById('manualResult').innerHTML = `✅ Steam OAuth Successful!\n\nToken: ${token.substring(0, 20)}...`;
                checkSystemStatus();
            }
        }

        // Check for OAuth callback
        if (window.location.search.includes('token=')) {
            handleOAuthCallback();
        }
    </script>
</body>
</html>
