<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam OAuth Test - Enhanced</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #444;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        .info { background: #17a2b8; }
        .warning { background: #ffc107; color: #000; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            margin: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover { background: #0056b3; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .user-info {
            background: #333;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
        }
        .debug {
            background: #111;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .auth-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-online { background: #28a745; }
        .status-offline { background: #dc3545; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .test-result {
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 12px;
        }
        .test-pass { background: rgba(40, 167, 69, 0.2); border-left: 4px solid #28a745; }
        .test-fail { background: rgba(220, 53, 69, 0.2); border-left: 4px solid #dc3545; }
    </style>
</head>
<body>
    <h1>🧪 Enhanced Steam OAuth Test</h1>
    <p>Этот тест проверяет все аспекты Steam аутентификации и предлагает несколько способов тестирования.</p>

    <div class="container">
        <h3>🚀 Тестирование Steam OAuth</h3>
        <div class="auth-status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="authStatus">Проверка статуса...</span>
        </div>

        <button onclick="testSteamAuth()">🔗 Login with Steam (Popup)</button>
        <button onclick="testDirectAuth()">🌐 Direct Steam Auth</button>
        <button onclick="checkCurrentUser()">👤 Check Current User</button>
        <button onclick="logout()">🚪 Logout</button>
        <button onclick="clearDebug()">🗑️ Clear Debug</button>
        <button onclick="startAutoCheck()">🔄 Start Auto Check</button>
        <button onclick="stopAutoCheck()">⏹️ Stop Auto Check</button>
    </div>

    <div class="container">
        <h3>📊 Тесты Системы</h3>
        <div id="testResults"></div>
    </div>

    <div class="container">
        <h3>👤 Current User</h3>
        <div id="user-info" class="user-info">No user logged in</div>
    </div>

    <div class="container">
        <h3>🔧 Debug Log</h3>
        <div id="debug-log" class="debug"></div>
    </div>

    <script>
        let debugLog = document.getElementById('debug-log');
        let statusDiv = document.getElementById('status');
        let userInfoDiv = document.getElementById('user-info');
        let statusIndicator = document.getElementById('statusIndicator');
        let authStatus = document.getElementById('authStatus');
        let testResults = document.getElementById('testResults');
        let autoCheckInterval = null;

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            debugLog.innerHTML += logEntry + '\n';
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(logEntry);

            // Добавляем цветовую индикацию в зависимости от типа
            if (type === 'error') {
                debugLog.innerHTML += `<span style="color: #dc3545;">${logEntry}</span>\n`;
            } else if (type === 'success') {
                debugLog.innerHTML += `<span style="color: #28a745;">${logEntry}</span>\n`;
            } else if (type === 'warning') {
                debugLog.innerHTML += `<span style="color: #ffc107;">${logEntry}</span>\n`;
            }
        }

        function updateStatus(message, type = 'info') {
            authStatus.textContent = message;
            authStatus.className = `status ${type}`;
            if (type === 'success') {
                statusIndicator.className = 'status-indicator status-online';
            } else {
                statusIndicator.className = 'status-indicator status-offline';
            }
            log(`Status: ${message}`, type);
        }

        function updateUser(user) {
            if (user) {
                userInfoDiv.innerHTML = `
                    <h4>Hello, ${user.nickname}! 👋</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 10px 0;">
                        <div>
                            <strong>Steam ID:</strong> ${user.steamId}<br>
                            <strong>User ID:</strong> ${user.id}<br>
                            <strong>API Key:</strong> ${user.apiKey}<br>
                            <strong>Status:</strong> ${user.isActive ? 'Active' : 'Inactive'}
                        </div>
                        <div>
                            <strong>Total Trades:</strong> ${user.stats?.totalTrades || 0}<br>
                            <strong>Successful:</strong> ${user.stats?.successfulTrades || 0}<br>
                            <strong>Total Earned:</strong> $${(user.stats?.totalEarned || 0).toFixed(2)}<br>
                            <strong>Items Listed:</strong> ${user.stats?.itemsListed || 0}
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <strong>Avatar:</strong><br>
                        <img src="${user.avatar}" style="width: 64px; height: 64px; border-radius: 50%; border: 2px solid #007bff;" />
                        <a href="${user.profileUrl}" target="_blank" style="margin-left: 15px; color: #007bff;">View Steam Profile</a>
                    </div>
                `;
            } else {
                userInfoDiv.innerHTML = 'No user logged in';
            }
        }

        function addTestResult(testName, passed, details = '') {
            const resultClass = passed ? 'test-pass' : 'test-fail';
            testResults.innerHTML += `
                <div class="test-result ${resultClass}">
                    <strong>${passed ? '✅' : '❌'} ${testName}</strong>
                    ${details ? `<br><small>${details}</small>` : ''}
                </div>
            `;
        }

        async function checkCurrentUser() {
            try {
                log('🔍 Checking current user...');
                updateStatus('Checking current user...', 'info');

                const response = await fetch('http://localhost:3000/api/steam/auth/me');
                const data = await response.json();

                if (data.data) {
                    log(`✅ User found: ${data.data.nickname}`, 'success');
                    updateStatus(`Authenticated: ${data.data.nickname}`, 'success');
                    updateUser(data.data);
                    return true;
                } else {
                    log('ℹ️ No user authenticated', 'info');
                    updateStatus('Not authenticated', 'info');
                    updateUser(null);
                    return false;
                }
            } catch (error) {
                log(`❌ Error checking user: ${error.message}`, 'error');
                updateStatus('Error checking user', 'error');
                return false;
            }
        }

        function testSteamAuth() {
            log('🚀 Starting Steam authentication via popup...');

            const authWindow = window.open(
                'http://localhost:3000/api/steam/auth',
                'SteamAuth',
                'width=800,height=600,toolbar=no,menubar=no,scrollbars=yes'
            );

            if (!authWindow) {
                log('❌ Failed to open popup window', 'error');
                updateStatus('Failed to open popup', 'error');
                return;
            }

            log('✅ Popup window opened, waiting for authentication...', 'success');

            // Слушаем сообщения от popup
            const messageListener = (event) => {
                log(`📨 Message from: ${event.origin}`);
                log(`📨 Message type: ${event.data.type}`);

                if (event.origin !== 'http://localhost:3000') {
                    log(`❌ Invalid origin: ${event.origin}`, 'error');
                    return;
                }

                if (event.data.type === 'STEAM_AUTH_SUCCESS') {
                    log('🎉 Steam authentication successful!', 'success');
                    log(`User data: ${JSON.stringify(event.data.data.user, null, 2)}`);

                    updateStatus('Steam authentication successful!', 'success');
                    updateUser(event.data.data.user);

                    authWindow.close();
                    window.removeEventListener('message', messageListener);

                    // Автоматическая проверка через 2 секунды
                    setTimeout(checkCurrentUser, 2000);
                } else if (event.data.type === 'STEAM_AUTH_ERROR') {
                    log(`❌ Steam authentication error: ${event.data.data.error}`, 'error');
                    updateStatus(`Authentication failed: ${event.data.data.error}`, 'error');
                    authWindow.close();
                    window.removeEventListener('message', messageListener);
                }
            };

            window.addEventListener('message', messageListener);

            // Проверка закрытия popup
            const popupCheck = setInterval(() => {
                if (authWindow.closed) {
                    clearInterval(popupCheck);
                    log('ℹ️ Popup window was closed by user', 'info');
                    updateStatus('Popup closed, checking auth status...', 'info');
                    setTimeout(checkCurrentUser, 1000);
                    window.removeEventListener('message', messageListener);
                }
            }, 1000);
        }

        function testDirectAuth() {
            log('🌐 Redirecting to direct Steam auth...');
            window.open('http://localhost:3000/api/steam/auth', '_blank');
        }

        async function logout() {
            try {
                log('🚪 Logging out...');
                updateStatus('Logging out...', 'info');

                const response = await fetch('http://localhost:3000/api/steam/auth/logout', {
                    method: 'POST'
                });

                if (response.ok) {
                    log('✅ Logout successful', 'success');
                    updateStatus('Logged out successfully', 'success');
                    updateUser(null);
                } else {
                    log('❌ Logout failed', 'error');
                    updateStatus('Logout failed', 'error');
                }
            } catch (error) {
                log(`❌ Error during logout: ${error.message}`, 'error');
                updateStatus('Error during logout', 'error');
            }
        }

        function clearDebug() {
            debugLog.innerHTML = '';
            testResults.innerHTML = '';
            log('🗑️ Debug log cleared', 'info');
        }

        function startAutoCheck() {
            if (autoCheckInterval) {
                stopAutoCheck();
            }

            log('🔄 Starting auto-check every 3 seconds...', 'success');
            autoCheckInterval = setInterval(checkCurrentUser, 3000);
            updateStatus('Auto-check enabled', 'success');
        }

        function stopAutoCheck() {
            if (autoCheckInterval) {
                clearInterval(autoCheckInterval);
                autoCheckInterval = null;
                log('⏹️ Auto-check stopped', 'info');
                updateStatus('Auto-check disabled', 'info');
            }
        }

        // Комплексное тестирование системы
        async function runSystemTests() {
            log('🧪 Running system tests...', 'info');
            testResults.innerHTML = '';

            // Тест 1: Проверка соединения с сервером
            try {
                const response = await fetch('http://localhost:3000/api/health');
                const data = await response.json();
                addTestResult('Server Health Check', response.ok, `Service: ${data.service}`);
            } catch (error) {
                addTestResult('Server Health Check', false, error.message);
            }

            // Тест 2: Проверка Steam API
            try {
                const response = await fetch('http://localhost:3000/api/steam/auth/me');
                const data = await response.json();
                addTestResult('Steam Auth API', response.ok, `User: ${data.data?.nickname || 'none'}`);
            } catch (error) {
                addTestResult('Steam Auth API', false, error.message);
            }

            // Тест 3: Проверка postMessage
            addTestResult('PostMessage Listener', true, 'Listener attached to window');

            // Тест 4: Проверка CORS
            try {
                await fetch('http://localhost:3000/api/health');
                addTestResult('CORS Configuration', true, 'Cross-origin requests working');
            } catch (error) {
                addTestResult('CORS Configuration', false, error.message);
            }

            log('✅ System tests completed', 'success');
        }

        // Инициализация
        window.addEventListener('load', async () => {
            log('🚀 Enhanced Steam OAuth Test loaded', 'success');
            await checkCurrentUser();
            await runSystemTests();

            // Начинаем авто-проверку
            startAutoCheck();
        });

        // Глобальный слушатель сообщений
        window.addEventListener('message', (event) => {
            log(`🌐 Global message listener: ${event.data.type} from ${event.origin}`);
        });
    </script>
</body>
</html>
